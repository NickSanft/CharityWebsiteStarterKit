<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — {{charity_name}}</title>
  <meta name="description" content="About {{charity_name}}" />
  <link rel="icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand">
        <img src="assets/logo.png" alt="{{charity_name}} logo" />
        <span>{{charity_name}}</span>
      </a>
      <nav class="nav" aria-label="Main">
        <a href="index.html">Home</a>
        <a href="about.html" class="active">About</a>
        <!--IF:page_events--><a href="events.html">Events</a><!--ENDIF-->
        <!--IF:page_volunteer--><a href="volunteer.html">Volunteer</a><!--ENDIF-->
        <!--IF:page_donate--><a href="donate.html">Donate</a><!--ENDIF-->
        <!--IF:page_contact--><a href="contact.html">Contact</a><!--ENDIF-->
      </nav>
    </div>
  </header>

  <main>
    <section class="page">
      <div class="container">
        <h1>{{about_heading}}</h1>
        <p class="lead">{{about_lead}}</p>
        <div class="content">
          <p>{{about_body}}</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div>&copy; {{year}} {{charity_name}}. All rights reserved.</div>
      <div class="socials">
        <!--IF:social_twitter--><a href="{{social_twitter}}" rel="noopener">Twitter</a><!--ENDIF-->
        <!--IF:social_facebook--><a href="{{social_facebook}}" rel="noopener">Facebook</a><!--ENDIF-->
        <!--IF:social_instagram--><a href="{{social_instagram}}" rel="noopener">Instagram</a><!--ENDIF-->
      </div>
    </div>
  </footer>
</body>
</html>
