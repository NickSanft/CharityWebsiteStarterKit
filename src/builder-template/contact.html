<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — {{charity_name}}</title>
  <meta name="description" content="Contact {{charity_name}}" />
  <link rel="icon" href="assets/favicon.svg" />
  {{google_fonts_link}}
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand">
        <img src="assets/logo.svg" alt="{{charity_name}} logo" />
        <span>{{charity_name}}</span>
      </a>
      <nav class="nav" aria-label="Main">
        <a href="index.html">Home</a>
        <!--IF:page_about--><a href="about.html">About</a><!--ENDIF-->
        <!--IF:page_events--><a href="events.html">Events</a><!--ENDIF-->
        <!--IF:page_volunteer--><a href="volunteer.html">Volunteer</a><!--ENDIF-->
        <!--IF:page_donate--><a href="donate.html">Donate</a><!--ENDIF-->
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page">
      <div class="container">
        <h1>{{contact_heading}}</h1>
        <p class="lead">{{contact_lead}}</p>
        <div class="content">
          <p>Reach us by email at <a href="mailto:{{contact_email}}">{{contact_email}}</a>.</p>
        </div>
        <!--IF:formspree--><form class="contact" action="https://formspree.io/f/{{formspree_id}}" method="POST"><!--ENDIF-->
        <!--IFNOT:formspree--><form class="contact" action="mailto:{{contact_email}}" method="post" enctype="text/plain"><!--ENDIFNOT-->
          <div>
            <label for="name">Your name</label>
            <input id="name" name="name" type="text" required />
          </div>
          <div>
            <label for="email">Your email</label>
            <input id="email" name="email" type="email" required />
          </div>
          <div>
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send message</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div>&copy; {{year}} {{charity_name}}. All rights reserved.</div>
      <div class="socials">
        <!--IF:social_twitter--><a href="{{social_twitter}}" rel="noopener">Twitter</a><!--ENDIF-->
        <!--IF:social_facebook--><a href="{{social_facebook}}" rel="noopener">Facebook</a><!--ENDIF-->
        <!--IF:social_instagram--><a href="{{social_instagram}}" rel="noopener">Instagram</a><!--ENDIF-->
      </div>
    </div>
  </footer>
</body>
</html>
