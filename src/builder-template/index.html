<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{charity_name}}</title>
  <meta name="description" content="{{tagline}}" />
  <link rel="icon" href="assets/favicon.svg" />
  {{google_fonts_link}}
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand">
        <img src="assets/logo.svg" alt="{{charity_name}} logo" />
        <span>{{charity_name}}</span>
      </a>
      <nav class="nav" aria-label="Main">
        <a href="index.html" class="active">Home</a>
        <!--IF:page_about--><a href="about.html">About</a><!--ENDIF-->
        <!--IF:page_events--><a href="events.html">Events</a><!--ENDIF-->
        <!--IF:page_volunteer--><a href="volunteer.html">Volunteer</a><!--ENDIF-->
        <!--IF:page_donate--><a href="donate.html">Donate</a><!--ENDIF-->
        <!--IF:page_blog--><a href="blog.html">Blog</a><!--ENDIF-->
        <!--IF:page_contact--><a href="contact.html">Contact</a><!--ENDIF-->
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1>{{home_heading}}</h1>
        <p class="tagline">{{home_subheading}}</p>
        <div class="actions">
          <!--IF:page_donate--><a class="btn btn-primary" href="donate.html">Donate</a><!--ENDIF-->
          <!--IF:page_volunteer--><a class="btn btn-outline" href="volunteer.html">Volunteer</a><!--ENDIF-->
        </div>
      </div>
    </section>

    <!--IF:home_hero--><section class="page">
      <div class="container">
        <img src="assets/home-hero.jpg" alt="" class="hero-image" style="width:100%;max-height:400px;object-fit:cover;border-radius:var(--radius);margin-bottom:2rem" />
      </div>
    </section><!--ENDIF-->

    <section class="page">
      <div class="container">
        <div class="content">
          <p>{{home_body}}</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div>&copy; {{year}} {{charity_name}}. All rights reserved.</div>
      <div class="socials">
        <!--IF:social_twitter--><a href="{{social_twitter}}" rel="noopener">Twitter</a><!--ENDIF-->
        <!--IF:social_facebook--><a href="{{social_facebook}}" rel="noopener">Facebook</a><!--ENDIF-->
        <!--IF:social_instagram--><a href="{{social_instagram}}" rel="noopener">Instagram</a><!--ENDIF-->
      </div>
    </div>
  </footer>
</body>
</html>
