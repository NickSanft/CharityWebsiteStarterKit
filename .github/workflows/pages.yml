name: Deploy builder to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/app/builder/**'
      - 'src/lib/builder/**'
      - 'src/components/ui/**'
      - 'src/lib/utils.ts'
      - 'src/builder-template/**'
      - 'builder-site/**'
      - 'scripts/build-template-manifest.mjs'
      - 'scripts/sync-builder-site.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Serve at https://<user>.github.io/<repo>/, so the basePath is /<repo>.
      BUILDER_BASE_PATH: /${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            builder-site/package-lock.json

      - name: Install root deps (for the manifest script)
        run: npm ci --ignore-scripts

      - name: Install builder-site deps
        run: npm ci --prefix builder-site --ignore-scripts

      - name: Build static builder
        run: npm run builder:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: builder-site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
